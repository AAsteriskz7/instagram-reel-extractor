<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Extractor Configuration</title>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: rgba(17, 24, 39, 0.7);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      box-sizing: border-box;
    }
    
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    h3 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    h3 svg {
      color: var(--primary);
    }
    
    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    input, select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: var(--primary-hover);
    }
    
    .status-msg {
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      color: #10b981;
      height: 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .status-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <h3>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
      Gemini Extractor Helper
    </h3>
    <div class="subtitle">Configure the extension connection.</div>
    
    <div class="form-group">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>
    
    <div class="form-group">
      <label for="modelSelect">AI Model</label>
      <select id="modelSelect">
        <option value="auto">Auto (Smart Fallback)</option>
        <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="backendUrl">Local Backend URL</label>
      <input type="text" id="backendUrl" value="http://localhost:3000">
    </div>
    
    <button id="saveBtn" class="btn">Save Configuration</button>
    <div id="status" class="status-msg">Settings saved!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
